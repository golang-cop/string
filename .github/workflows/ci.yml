name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  COVERAGE_MIN: "100.0"

jobs:
  native:
    name: native (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test (with coverage gate)
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r pkg; do
            out="$(CGO_ENABLED=0 go test -cover -covermode=atomic "$pkg" 2>&1)" || {
              echo "$out"; fail=1; continue
            }
            echo "$out"
            if grep -q "no test files" <<<"$out"; then
              continue
            fi
            cov="$(grep -oE 'coverage: [0-9.]+%' <<<"$out" | grep -oE '[0-9.]+' | tail -n1)"
            if [ -z "$cov" ]; then
              echo "::error::no coverage figure for $pkg"; fail=1; continue
            fi
            if awk "BEGIN{exit !($cov < $COVERAGE_MIN)}"; then
              echo "::error::$pkg coverage ${cov}% < ${COVERAGE_MIN}%"; fail=1
            fi
          done < <(go list ./...)
          exit $fail

  emulated:
    name: emulated (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: "rv64,v=true,vlen=128"
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: "la464"
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: "power9"
          - arch: s390x
            image: debian:trixie
            qemu_cpu: "qemu"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Register binfmt handlers (QEMU)
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile per-package test binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/testbins
          : > /tmp/testbins/manifest
          while IFS= read -r pkg; do
            safe="$(tr '/.' '__' <<<"$pkg")"
            bin="/tmp/testbins/${safe}.test"
            out="$(CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
              go test -c -covermode=atomic -o "$bin" "$pkg" 2>&1)" || {
              echo "$out"; echo "::error::failed to build test binary for $pkg"; exit 1
            }
            echo "$out"
            if [ -f "$bin" ]; then
              # record "binary<TAB>package-dir" so we can run from the pkg dir
              dir="$(go list -f '{{.Dir}}' "$pkg")"
              printf '%s\t%s\n' "$bin" "$dir" >> /tmp/testbins/manifest
            else
              echo "no test binary for $pkg (no test files) — skipping"
            fi
          done < <(go list ./...)
          echo "Test binaries to run:"; cat /tmp/testbins/manifest || true

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        shell: bash
        env:
          QEMU_CPU: ${{ matrix.qemu_cpu }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/testbins/manifest ]; then
            echo "::error::no test binaries were produced for ${{ matrix.arch }}"
            exit 1
          fi
          fail=0
          while IFS=$'\t' read -r bin dir; do
            name="$(basename "$bin")"
            echo "==> running $name on ${{ matrix.arch }}"
            out="$(docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU="$QEMU_CPU" \
              -v "$bin":/test.bin:ro \
              -v "$dir":/pkg:ro \
              -w /pkg \
              ${{ matrix.image }} \
              /test.bin -test.v 2>&1)" || fail=1
            echo "$out"
            cov="$(grep -oE 'coverage: [0-9.]+%' <<<"$out" | grep -oE '[0-9.]+' | tail -n1)"
            if [ -n "$cov" ]; then
              if awk "BEGIN{exit !($cov < $COVERAGE_MIN)}"; then
                echo "::error::$name coverage ${cov}% < ${COVERAGE_MIN}%"; fail=1
              fi
            fi
          done < /tmp/testbins/manifest
          exit $fail
